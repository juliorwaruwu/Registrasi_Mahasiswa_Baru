<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Verifikasi Data</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins', sans-serif;
            background:#f1f3f6;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .container{
            width:100%;
            max-width:430px;
            background:white;
            border:2px solid #0b5c8e;
            border-radius:8px;
            overflow:hidden;
            box-shadow:0 3px 10px rgba(0,0,0,0.12);
        }

        .header{
            background:#0b4f79;
            color:white;
            padding:22px;
        }

        .header h2{
            font-size:34px;
            font-weight:700;
        }

        .content{
            padding:24px;
        }

        .info-box{
            background:#f7f7f7;
            border-radius:6px;
            padding:18px;
            margin-bottom:24px;
        }

        .info-row{
            display:flex;
            margin-bottom:14px;
        }

        .info-row:last-child{
            margin-bottom:0;
        }

        .label{
            width:90px;
            font-weight:700;
            color:#222;
            font-size:14px;
        }

        .value{
            color:#333;
            font-size:14px;
        }

        .form-group{
            margin-bottom:22px;
        }

        .form-group label{
            display:block;
            margin-bottom:10px;
            font-size:14px;
            font-weight:600;
            color:#333;
        }

        select{
            width:100%;
            padding:13px 14px;
            border:1px solid #d7d7d7;
            border-radius:6px;
            outline:none;
            font-size:14px;
            background:white;
        }

        select:focus{
            border-color:#0b5c8e;
        }

        .verify-btn{
            width:100%;
            background:#0b4f79;
            color:white;
            border:none;
            padding:14px;
            border-radius:6px;
            font-size:15px;
            font-weight:600;
            cursor:pointer;
            transition:0.2s;
        }

        .verify-btn:hover{
            background:#083a59;
        }

        .back{
            text-align:center;
            margin-top:16px;
        }

        .back a{
            color:#8b8bff;
            text-decoration:none;
            font-size:13px;
        }

        .back a:hover{
            text-decoration:underline;
        }

    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <h2>Verifikasi Pendaftaran</h2>
    </div>

    <div class="content">

        <div class="info-box">

            <div class="info-row">
                <div class="label">Nama</div>

                <div class="value"
                     th:text="${mahasiswa.nama}">
                    Julior Putra Waruwu
                </div>
            </div>

            <div class="info-row">
                <div class="label">NIM</div>

                <div class="value"
                     th:text="${mahasiswa.nim}">
                    0420230003
                </div>
            </div>

            <div class="info-row">
                <div class="label">Prodi</div>

                <div class="value"
                     th:text="${mahasiswa.prodi}">
                    Teknik Informatika
                </div>
            </div>

            <div class="info-row">
                <div class="label">Status</div>

                <div class="value"
                     th:text="${mahasiswa.status}">
                    PENDING
                </div>
            </div>

        </div>

        <form th:action="@{'/admin/verify/' + ${mahasiswa.id}}"
              method="post">

            <div class="form-group">

                <label>Status Verifikasi</label>

                <select name="status" required>

                    <option value="" selected disabled>
                        Pilih Status
                    </option>

                    <option value="VERIFIED">
                        Terverifikasi
                    </option>

                    <option value="REJECTED">
                        Ditolak
                    </option>

                </select>

            </div>

            <button type="submit"
                    class="verify-btn">

                Proses Verifikasi

            </button>

        </form>

        <div class="back">

            <a href="/admin/dashboard">
                Kembali ke Dashboard
            </a>

        </div>

    </div>

</div>

</body>
</html>
