<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login Admin</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins', sans-serif;
            background:#f1f1f1;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:100%;
            max-width:420px;
            background:white;
            border-radius:10px;
            overflow:hidden;
            border:2px solid #cfd8dc;
            box-shadow:0 4px 10px rgba(0,0,0,0.12);
        }

        .header{
            background:#0b4f79;
            color:white;
            text-align:center;
            padding:32px 20px;
        }

        .header h2{
            font-size:40px;
            font-weight:700;
            margin-bottom:8px;
        }

        .header p{
            font-size:18px;
            font-weight:500;
            opacity:0.95;
        }

        .form-section{
            padding:45px 40px;
        }

        .form-group{
            margin-bottom:28px;
        }

        label{
            display:block;
            margin-bottom:10px;
            font-size:20px;
            font-weight:600;
            color:#4b4b4b;
        }

        input{
            width:100%;
            padding:16px;
            border:2px solid #e0e0e0;
            border-radius:10px;
            font-size:16px;
            outline:none;
            transition:0.2s;
        }

        input:focus{
            border-color:#0b4f79;
        }

        input::placeholder{
            color:#999;
        }

        button{
            width:100%;
            padding:16px;
            border:none;
            border-radius:10px;
            background:#0b4f79;
            color:white;
            font-size:20px;
            font-weight:600;
            cursor:pointer;
            transition:0.2s;
        }

        button:hover{
            background:#083b5b;
        }

        .error-message{
            margin-top:16px;
            text-align:center;
            color:red;
            font-size:14px;
        }

        @media(max-width:500px){

            .container{
                margin:15px;
            }

            .header h2{
                font-size:32px;
            }

            .header p{
                font-size:15px;
            }

            .form-section{
                padding:35px 25px;
            }

            label{
                font-size:17px;
            }

        }

    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <h2>Admin Panel</h2>
        <p>Registrasi Mahasiswa Baru</p>
    </div>

    <div class="form-section">

        <form th:action="@{/login}" method="post">

            <div class="form-group">

                <label>Username</label>

                <input type="text"
                       name="username"
                       placeholder="Masukkan username">

            </div>

            <div class="form-group">

                <label>Password</label>

                <input type="password"
                       name="password"
                       placeholder="Masukkan password">

            </div>

            <button type="submit">
                Login
            </button>

            <p class="error-message" th:text="${error}"></p>

        </form>

    </div>

</div>

</body>
</html>
