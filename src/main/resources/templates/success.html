<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Pendaftaran Berhasil</title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:'Poppins',sans-serif;

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            background:#f5f5f5;
        }

        .success-card{

            width:420px;

            background:white;

            border-radius:6px;

            padding:50px 40px;

            text-align:center;

            border:2px solid #1d5d84;

            box-shadow:0 4px 15px rgba(0,0,0,0.08);
        }

        .check-icon{

            font-size:80px;

            color:#56b95b;

            line-height:1;

            margin-bottom:20px;
        }

        h1{

            font-size:42px;

            color:#2d3748;

            margin-bottom:20px;

            font-weight:700;
        }

        .desc{

            color:#7b8794;

            font-size:15px;

            margin-bottom:30px;
        }

        .desc2{

            color:#7b8794;

            font-size:15px;

            margin-bottom:40px;
        }

        .btn-back{

            display:inline-block;

            background:#0f5a86;

            color:white;

            text-decoration:none;

            padding:12px 28px;

            border-radius:8px;

            font-weight:600;

            transition:0.3s;
        }

        .btn-back:hover{

            background:#0c4a6e;
        }

    </style>

</head>

<body>

<div class="success-card">

    <div class="check-icon">
        ✓
    </div>

    <h1>
        Pendaftaran Berhasil!
    </h1>

    <p class="desc">
        Pendaftaran berhasil! Terima kasih telah mendaftar.
    </p>

    <p class="desc2">
        Terima kasih telah mendaftar.
    </p>

    <a href="/"
       class="btn-back">

        Kembali

    </a>

</div>

</body>
</html>
