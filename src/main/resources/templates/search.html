<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Pencarian Pendaftar</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins', sans-serif;
            background:#f4f6f9;
            padding:20px;
        }

        .container{
            width:100%;
            max-width:1100px;
            margin:auto;
            background:white;
            border:2px solid #0b5c8e;
            border-radius:4px;
            overflow:hidden;
            box-shadow:0 2px 8px rgba(0,0,0,0.08);
        }

        .header{
            padding:18px 22px;
            border-bottom:1px solid #e5e5e5;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .header-left{
            display:flex;
            align-items:center;
            gap:10px;
        }

        .header-left h2{
            font-size:28px;
            color:#111;
            font-weight:700;
        }

        .header-right{
            display:flex;
            gap:18px;
        }

        .header-right a{
            text-decoration:none;
            color:#7d7dff;
            font-size:13px;
            font-weight:500;
        }

        .content{
            padding:20px;
        }

        .form-group{
            margin-bottom:18px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-size:13px;
            font-weight:600;
            color:#333;
        }

        input,
        select{
            width:100%;
            padding:11px 14px;
            border:1px solid #dcdcdc;
            border-radius:4px;
            outline:none;
            font-size:13px;
            background:white;
        }

        input:focus,
        select:focus{
            border-color:#0b5c8e;
        }

        .filter-row{
            display:flex;
            align-items:end;
            gap:12px;
        }

        .filter-row .form-group{
            flex:1;
        }

        .search-btn{
            background:#6d7df0;
            color:white;
            border:none;
            padding:11px 18px;
            border-radius:4px;
            cursor:pointer;
            font-size:12px;
            font-weight:500;
            margin-bottom:18px;
        }

        .search-btn:hover{
            opacity:0.95;
        }

        .result-box{
            margin-top:24px;
            border-top:1px solid #e8e8e8;
            padding-top:18px;
        }

        .result-title{
            font-size:15px;
            font-weight:600;
            margin-bottom:14px;
            color:#111;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        thead{
            background:#f5f5f5;
        }

        thead th{
            text-align:left;
            padding:14px;
            font-size:13px;
            font-weight:600;
            color:#222;
        }

        tbody td{
            padding:14px;
            border-bottom:1px solid #ececec;
            font-size:13px;
            color:#444;
        }

        .status{
            padding:4px 10px;
            border-radius:20px;
            font-size:11px;
            font-weight:600;
        }

        .verified{
            background:#dff5e3;
            color:#3ca456;
        }

        .pending{
            background:#fff0d8;
            color:#df9723;
        }

        .action-btn{
            background:#0b5c8e;
            color:white;
            text-decoration:none;
            padding:6px 12px;
            border-radius:4px;
            font-size:12px;
        }

        .empty{
            margin-top:18px;
            padding:20px;
            background:#fafafa;
            border:1px dashed #d6d6d6;
            text-align:center;
            color:#777;
            font-size:14px;
            border-radius:4px;
        }

        @media(max-width:768px){

            .header{
                flex-direction:column;
                align-items:flex-start;
                gap:14px;
            }

            .filter-row{
                flex-direction:column;
                align-items:stretch;
            }

            .search-btn{
                width:100%;
            }

            table{
                min-width:700px;
            }

            .table-wrapper{
                overflow-x:auto;
            }

        }

    </style>
</head>

<body>

<div class="container">

    <div class="header">

        <div class="header-left">

            <h2>🔍 Pencarian Pendaftar</h2>

        </div>

        <div class="header-right">

             <a th:href="@{/}"> Form Pendaftaran </a>
             <a th:href="@{/admin/dashboard}"> Daftar Pendaftar </a>
            

        </div>

    </div>

    <div class="content">

        <form action="/admin/search" method="get">

            <div class="form-group">

                <label>Keyword (Nama/NIM)</label>

                <input type="text"
                       name="keyword"
                       placeholder="Julior Putra">

            </div>

            <div class="filter-row">

                <div class="form-group">

                    <label>Status</label>

                    <select name="status">
                        <option value="">Semua Status</option>
                        <option value="PENDING">Pending</option>
                        <option value="VERIFIED">Verified</option>
                    </select>

                </div>

                <button type="submit" class="search-btn">
                    Cari Data
                </button>

            </div>

        </form>

        <div class="result-box">

            <div class="result-title">
                Hasil Pencarian :
                <span th:text="${#lists.size(list)}"></span>
                data ditemukan
            </div>

            <div class="table-wrapper">

                <table th:if="${!#lists.isEmpty(list)}">

                    <thead>
                    <tr>
                        <th>Nama</th>
                        <th>NIM</th>
                        <th>Prodi</th>
                        <th>Status</th>
                        <th>Aksi</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:each="m : ${list}">

                        <td th:text="${m.nama}"></td>

                        <td th:text="${m.nim}"></td>

                        <td th:text="${m.prodi}"></td>

                        <td>

                            <span th:if="${m.status == 'VERIFIED'}"
                                  class="status verified">
                                VERIFIED
                            </span>

                            <span th:if="${m.status == 'PENDING'}"
                                  class="status pending">
                                PENDING
                            </span>

                        </td>

                        <td>

                            <a href="#"
                               class="action-btn">
                                Detail
                            </a>

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

            <div class="empty"
                 th:if="${#lists.isEmpty(list)}">

                Data calon mahasiswa tidak ditemukan

            </div>

        </div>

    </div>

</div>

</body>
</html>
